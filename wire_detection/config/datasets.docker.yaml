# Docker dataset paths — mount host dirs in docker-compose.yml
datasets:
  gt_labels:
    path: /data/gt_labels
    image_glob: "images/*.jpg"
    label_format: yolo_obb
    label_glob: "labels/train/manually_verified_no_background_data/images/*.txt"
    component_labels: true
    description: "Manually verified wire labels (mount GT_LABELS_PATH)"

  hdc:
    path: /data/hdc
    image_glob: "train/images/*.jpg"
    label_format: yolo_obb
    label_glob: "train/labels/*.txt"
    component_labels: true
    description: "HDC-Recognition PCB schematics (roboflow_test2)"

  synthetic:
    path: /data/synthetic
    image_glob: "images/*.jpg"
    label_format: lines
    label_glob: "labels/*.txt"
    component_labels: false
    description: "Synthetic wires (auto-generated on first start if empty)"

  hand_drawn:
    path: /data/hand_drawn
    image_glob: "**/images/*.jpg"
    label_format: yolo_obb
    label_glob: "**/labels/*.txt"
    component_labels: false
    description: "Hand-drawn circuit wires (optional mount)"
