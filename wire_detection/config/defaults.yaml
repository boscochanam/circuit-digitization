stages:
  - crop
  - mask
  - threshold
  - invert
  - close
  - ccl
  - contour_extract
  - dedup

stage_params:
  crop:
    padding: 10
  mask:
    fill_value: 255
    occlusion_margin: 0.15
  threshold:
    mode: sauvola
    k: 0.30
    r: 128
    window: 51
    fallback_k: 0.25
    min_trace: 0.5
  close:
    kernel_size: 3
    iterations: 1
    shape: ellipse
  ccl:
    min_area: 20
    connectivity: 8
    backend: opencv
  contour_extract:
    method: farthest_pair
  dedup:
    angle_thresh: 10
    dist_thresh: 18

component_detection:
  source: model  # "model" | "ground_truth" | "roboflow"
  model_path: models/component_detection/yolo26m_obb_16class_aug.pt
  confidence_threshold: 0.5
